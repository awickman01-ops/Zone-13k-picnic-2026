<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Document Viewer</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 40px;
      background: #f7f7f7;
    }
    h1 {
      text-align: center;
    }
    .pdf-container {
      width: 100%;
      height: 90vh;
      border: 1px solid #ccc;
    }
    .download {
      text-align: center;
      margin-top: 15px;
    }
  </style>
</head>
<body>

<h1>Document Viewer</h1>

<iframe 
  src="document.pdf" 
  class="pdf-container">
</iframe>

<div class="download">
  <a href="document.pdf" download>Download PDF</a>
</div>

</body>
</html>
